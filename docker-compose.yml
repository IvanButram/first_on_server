services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: docker_todo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d docker_todo"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "9091:9091"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data: